<!DOCTYPE html>
<html>
<head>

<title>Real Estate Deal Calculator</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#f4f6f9;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:25px;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.field{
display:flex;
flex-direction:column;
}

label{
font-weight:bold;
margin-bottom:5px;
}

input{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
margin-top:20px;
padding:14px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
width:100%;
}

button:hover{
background:#0056b3;
}

.result{
margin-top:30px;
background:#eef3ff;
padding:20px;
border-radius:8px;
display:none;
}

.result-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.result-box{
background:white;
padding:15px;
border-radius:6px;
box-shadow:0 0 5px rgba(0,0,0,0.05);
}

.result-box span{
font-weight:bold;
font-size:18px;
}

/* MOBILE */

@media(max-width:700px){

.form-grid{
grid-template-columns:1fr;
}

.result-grid{
grid-template-columns:1fr;
}

.container{
padding:20px;
}

}

</style>

</head>

<body>

<div class="container">

<h2>Real Estate Deal Analyzer</h2>

<div class="form-grid">

<div class="field">
<label>Purchase Price ($)</label>
<input type="number" id="price">
</div>

<div class="field">
<label>Annual NOI ($)</label>
<input type="number" id="noi">
</div>

<div class="field">
<label>Bank LTV (%)</label>
<input type="number" id="ltv" value="70">
</div>

<div class="field">
<label>Interest Rate (%)</label>
<input type="number" id="rate" value="6">
</div>

<div class="field">
<label>Amortization Years</label>
<input type="number" id="amort" value="25">
</div>

</div>

<button onclick="calculateDeal()">Calculate Deal</button>

<div class="result" id="result">

<h3>Results</h3>

<div class="result-grid">

<div class="result-box">
Loan Amount<br>
<span id="loan"></span>
</div>

<div class="result-box">
Monthly Payment<br>
<span id="monthly"></span>
</div>

<div class="result-box">
Annual Debt Service<br>
<span id="annual"></span>
</div>

<div class="result-box">
DSCR<br>
<span id="dscr"></span>
</div>

<div class="result-box">
Cap Rate<br>
<span id="cap"></span>
</div>

</div>

</div>

</div>

<script>

function monthlyRate(rate){
return rate/100/12;
}

function monthlyPayment(principal,rate,years){

let r=monthlyRate(rate);
let periods=years*12;

if(r==0){
return principal/periods;
}

return (principal*r)/(1-Math.pow(1+r,-periods));
}

function money(v){
return "$"+Math.round(v).toLocaleString();
}

function calculateDeal(){

let price=parseFloat(document.getElementById("price").value)||0;
let noi=parseFloat(document.getElementById("noi").value)||0;
let ltv=parseFloat(document.getElementById("ltv").value)||0;
let rate=parseFloat(document.getElementById("rate").value)||0;
let amort=parseFloat(document.getElementById("amort").value)||0;

let loan=price*(ltv/100);

let monthly=monthlyPayment(loan,rate,amort);

let annual=monthly*12;

let dscr=annual>0 ? noi/annual : 0;

let cap=price>0 ? (noi/price)*100 : 0;

document.getElementById("loan").innerHTML=money(loan);
document.getElementById("monthly").innerHTML=money(monthly);
document.getElementById("annual").innerHTML=money(annual);
document.getElementById("dscr").innerHTML=dscr.toFixed(2);
document.getElementById("cap").innerHTML=cap.toFixed(2)+"%";

document.getElementById("result").style.display="block";

}

</script>

</body>
</html>
